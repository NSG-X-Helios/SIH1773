name: "publish"

on:
  push:
    branches:
      - master
jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
          # - platform: "macos-latest" # for Intel based macs.
          #   args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        run: npm install -g pnpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev poppler-utils imagemagick libappindicator3-dev librsvg2-dev patchelf
        # webkitgtk 4.0 is for Tauri v1 - webkitgtk 4.1 is for Tauri v2.

      - name: install dependencies (windows)
        if: matrix.platform == 'windows-latest'
        run: choco install imagemagick poppler

      - name: install dependencies (macos)
        if: matrix.platform == 'macos-latest'
        run: |
          brew update
          brew install imagemagick poppler

      - name: install frontend dependencies
        run: pnpm install # change this to npm, pnpm or bun depending on which one you use.

      - name: Setup Python 3.10.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.10.11

      - name: Build convertor in windows
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cd 2D-to-3D-convertor
          python -m venv venv
          .\venv\Scripts\Activate.ps1
          python --version
          # pip install --upgrade pip
          pip install -r requirements.txt
          pnpm run convertor-pipeline

      - name: Build convertor in linux/mac
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'macos-latest'
        run: |
          cd 2D-to-3D-convertor
          python -m venv venv
          source venv/bin/activate
          python --version
          # pip install --upgrade pip
          pip install -r requirements.txt
          pnpm run convertor-pipeline

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
